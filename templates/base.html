<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <div class="col">
                <nav class="navbar navbar-expand-lg navbar-dark bg-dark ">
                    <a class="navbar-brand d-flex align-item-center ps-4" href="{{url_for('home')}}">
                        <img class="me-3" src="{{url_for('static', filename='Skills.png')}}" alt="Logo" width="40" height="40">
                        WELCOME TO OUR WEBSITE {{name}}
                    </a>
                    <div class="container-fluid">
                    <ul class="navbar-nav ms-auto py-5">
                        <li class="nav-item"><a class="nav-link" href="{{url_for('home')}}">HOME</a></li>
                        <li class="nav-item"><a class="nav-link" href="{{url_for('about')}}">ABOUT</a></li>
                        <li class="nav-item"><a class="nav-link" href="{{url_for('contact')}}">CONTACT</a></li>
                    </ul>
                    </div>
                </nav>
            </div>
        </div>
    </div>
    {% block content %}{% endblock %}

    <footer class="text-center">
        <p>@ 2026 {{company}} THANKS FOR VISITING OUR WEBSITE {{name}} | All  RIGHTS RESERVED </p>
    </footer>
</body>
</html>
